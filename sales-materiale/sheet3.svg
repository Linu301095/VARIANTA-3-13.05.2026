  <rect x="350" y="1300" width="500" height="90" rx="45" fill="#1A1A1A"/>
  <text x="600" y="1358" font-family="Nunito" font-size="32" font-weight="900" fill="#FFFFFF" text-anchor="middle">www.calyhub.ro</text>

  <text x="600" y="1445" font-family="Nunito" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="middle" opacity="0.9">CalyHub · Platforma saloanelor de grooming din România</text>
