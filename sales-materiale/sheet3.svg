  <!-- Price after -->
  <rect x="150" y="1035" width="900" height="85" rx="18" fill="#FFF3EA"/>
  <text x="600" y="1073" font-family="Nunito" font-size="25" font-weight="700" fill="#6B7280" text-anchor="middle">După perioada gratuită, de la doar</text>
