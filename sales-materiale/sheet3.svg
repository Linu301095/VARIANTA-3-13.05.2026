    <text x="215" y="688" font-family="Nunito" font-size="29" font-weight="700" fill="#374151">3 luni gratuite, fără card la înscriere</text>
  </g>
  <g>
    <circle cx="170" cy="753" r="22" fill="#FF6B00"/>
    <g transform="translate(159,744)" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,11 8,17 20,3"/></g>
    <text x="215" y="763" font-family="Nunito" font-size="29" font-weight="700" fill="#374151">0% comision pe programări — mereu</text>
  </g>
  <g>
    <circle cx="170" cy="828" r="22" fill="#FF6B00"/>
    <g transform="translate(159,819)" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,11 8,17 20,3"/></g>
    <text x="215" y="838" font-family="Nunito" font-size="29" font-weight="700" fill="#374151">Configurare gratuită — îți punem noi totul</text>
  </g>
  <g>
