    <g transform="translate(159,969)" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,11 8,17 20,3"/></g>
    <text x="215" y="988" font-family="Nunito" font-size="29" font-weight="700" fill="#374151">Acces la funcțiile AI pe măsură ce apar</text>
