    <g transform="translate(159,894)" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,11 8,17 20,3"/></g>
    <text x="215" y="913" font-family="Nunito" font-size="29" font-weight="700" fill="#374151">Suport dedicat, direct cu echipa</text>
  </g>
  <g>
