      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF8C42"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1500" fill="url(#orange3)"/>

  <!-- Badge -->
  <rect x="370" y="90" width="460" height="70" rx="35" fill="#FFFFFF"/>
  <text x="600" y="138" font-family="Nunito" font-size="30" font-weight="900" fill="#FF6B00" text-anchor="middle">OFERTĂ FONDATORI</text>

  <text x="600" y="290" font-family="Nunito" font-size="58" font-weight="900" fill="#FFFFFF" text-anchor="middle">Primele 3 luni</text>
  <text x="600" y="365" font-family="Nunito" font-size="58" font-weight="900" fill="#FFFFFF" text-anchor="middle">100% GRATUITE</text>

  <text x="600" y="445" font-family="Nunito" font-size="30" font-weight="700" fill="#FFFFFF" text-anchor="middle" opacity="0.95">Doar pentru primele 10 saloane înscrise</text>

  <!-- White card -->
  <rect x="90" y="510" width="1020" height="640" rx="32" fill="#FFFFFF"/>

  <text x="600" y="600" font-family="Nunito" font-size="34" font-weight="900" fill="#1A1A1A" text-anchor="middle">Ce primești ca partener fondator</text>

  <!-- Check rows -->
  <g>
