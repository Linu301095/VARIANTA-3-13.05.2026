<svg width="1200" height="1500" viewBox="0 0 1200 1500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF7F1"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF8C42"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1500" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="14" fill="url(#orange)"/>

  <!-- Brand -->
  <text x="600" y="120" font-family="Nunito" font-size="54" font-weight="900" fill="#1A1A1A" text-anchor="middle">Caly<tspan fill="#FF6B00">Hub</tspan></text>
  <text x="600" y="165" font-family="Nunito" font-size="24" font-weight="700" fill="#9CA3AF" text-anchor="middle" letter-spacing="3">PLATFORMA SALOANELOR DE GROOMING</text>

  <!-- Hero -->
  <text x="600" y="290" font-family="Nunito" font-size="62" font-weight="900" fill="#1A1A1A" text-anchor="middle">Agenda plină.</text>
  <text x="600" y="368" font-family="Nunito" font-size="62" font-weight="900" fill="#FF6B00" text-anchor="middle">Zero bătăi de cap.</text>

  <text x="600" y="445" font-family="Nunito" font-size="30" font-weight="600" fill="#6B7280" text-anchor="middle">Sistemul complet de programări online,</text>
  <text x="600" y="488" font-family="Nunito" font-size="30" font-weight="600" fill="#6B7280" text-anchor="middle">construit special pentru saloanele de grooming.</text>

  <!-- Card 1 -->
  <rect x="90" y="580" width="1020" height="200" rx="28" fill="#FFFFFF" stroke="#FFE3CF" stroke-width="2"/>
  <circle cx="200" cy="680" r="56" fill="#FFF3EA"/>
  <!-- calendar icon -->
  <g transform="translate(170,650)" stroke="#FF6B00" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="6" width="56" height="52" rx="8"/>
    <line x1="2" y1="22" x2="58" y2="22"/>
    <line x1="16" y1="2" x2="16" y2="12"/>
    <line x1="44" y1="2" x2="44" y2="12"/>
  </g>
  <text x="300" y="660" font-family="Nunito" font-size="38" font-weight="900" fill="#1A1A1A">Programări 24/7, automat</text>
  <text x="300" y="710" font-family="Nunito" font-size="26" font-weight="600" fill="#6B7280">Clienții rezervă singuri online — chiar și</text>
  <text x="300" y="745" font-family="Nunito" font-size="26" font-weight="600" fill="#6B7280">noaptea. Tu doar confirmi cu un click.</text>

  <!-- Card 2 -->
  <rect x="90" y="810" width="1020" height="200" rx="28" fill="#FFFFFF" stroke="#FFE3CF" stroke-width="2"/>
  <circle cx="200" cy="910" r="56" fill="#FFF3EA"/>
  <!-- scissors icon -->
  <g transform="translate(172,882)" stroke="#FF6B00" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="10" cy="46" r="9"/>
    <circle cx="10" cy="10" r="9"/>
    <line x1="56" y1="2" x2="18" y2="40"/>
    <line x1="18" y1="16" x2="56" y2="54"/>
  </g>
  <text x="300" y="890" font-family="Nunito" font-size="38" font-weight="900" fill="#1A1A1A">Agendă pe fiecare groomer</text>
  <text x="300" y="940" font-family="Nunito" font-size="26" font-weight="600" fill="#6B7280">Orar individual, sloturi pe specialist și</text>
  <text x="300" y="975" font-family="Nunito" font-size="26" font-weight="600" fill="#6B7280">prețuri în funcție de talia animalului.</text>

  <!-- Card 3 -->
  <rect x="90" y="1040" width="1020" height="200" rx="28" fill="#FFFFFF" stroke="#FFE3CF" stroke-width="2"/>
  <circle cx="200" cy="1140" r="56" fill="#FFF3EA"/>
  <!-- bar chart icon -->
  <g transform="translate(172,1112)" stroke="#FF6B00" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="4" y1="4" x2="4" y2="56"/>
    <line x1="4" y1="56" x2="58" y2="56"/>
    <rect x="16" y="36" width="10" height="18" fill="#FF6B00" stroke="none"/>
    <rect x="33" y="24" width="10" height="30" fill="#FF6B00" stroke="none"/>
    <rect x="50" y="14" width="10" height="40" fill="#FF6B00" stroke="none"/>
  </g>
  <text x="300" y="1120" font-family="Nunito" font-size="38" font-weight="900" fill="#1A1A1A">Vezi exact cât încasezi</text>
  <text x="300" y="1170" font-family="Nunito" font-size="26" font-weight="600" fill="#6B7280">Statistici reale, top servicii, productivitate</text>
  <text x="300" y="1205" font-family="Nunito" font-size="26" font-weight="600" fill="#6B7280">groomeri și raport Excel cu un click.</text>

  <!-- Footer band -->
  <rect x="0" y="1320" width="1200" height="180" fill="#1A1A1A"/>
  <text x="600" y="1400" font-family="Nunito" font-size="40" font-weight="900" fill="#FFFFFF" text-anchor="middle">Mai mult timp pentru animale.</text>
  <text x="600" y="1450" font-family="Nunito" font-size="30" font-weight="700" fill="#FF8C42" text-anchor="middle">Mai puțin timp la telefon.</text>
</svg>
