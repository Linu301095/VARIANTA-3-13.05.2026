<svg width="1200" height="1500" viewBox="0 0 1200 1500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF7F1"/>
    </linearGradient>
    <linearGradient id="orange2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF8C42"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1500" fill="url(#bg2)"/>
  <rect x="0" y="0" width="1200" height="14" fill="url(#orange2)"/>

  <text x="600" y="110" font-family="Nunito" font-size="44" font-weight="900" fill="#1A1A1A" text-anchor="middle">De ce aleg saloanele <tspan fill="#FF6B00">CalyHub</tspan></text>

  <text x="100" y="210" font-family="Nunito" font-size="30" font-weight="900" fill="#9CA3AF">FĂRĂ CalyHub</text>
  <text x="650" y="210" font-family="Nunito" font-size="30" font-weight="900" fill="#FF6B00">CU CalyHub</text>

  <!-- Row 1 -->
  <rect x="90" y="240" width="480" height="120" rx="20" fill="#F3F4F6"/>
  <circle cx="145" cy="300" r="24" fill="#E5E7EB"/>
  <g transform="translate(133,288)" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round"><line x1="2" y1="2" x2="22" y2="22"/><line x1="22" y1="2" x2="2" y2="22"/></g>
  <text x="190" y="290" font-family="Nunito" font-size="24" font-weight="700" fill="#6B7280">Telefonul sună non-stop</text>
  <text x="190" y="328" font-family="Nunito" font-size="24" font-weight="700" fill="#6B7280">în timp ce lucrezi</text>

  <rect x="630" y="240" width="480" height="120" rx="20" fill="#FFF3EA" stroke="#FFD9BF" stroke-width="2"/>
  <circle cx="685" cy="300" r="24" fill="#FF6B00"/>
  <g transform="translate(673,290)" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,12 9,19 22,3"/></g>
  <text x="730" y="290" font-family="Nunito" font-size="24" font-weight="800" fill="#1A1A1A">Clienții rezervă singuri,</text>
  <text x="730" y="328" font-family="Nunito" font-size="24" font-weight="800" fill="#1A1A1A">online, fără să te sune</text>

  <!-- Row 2 -->
  <rect x="90" y="385" width="480" height="120" rx="20" fill="#F3F4F6"/>
  <circle cx="145" cy="445" r="24" fill="#E5E7EB"/>
  <g transform="translate(133,433)" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round"><line x1="2" y1="2" x2="22" y2="22"/><line x1="22" y1="2" x2="2" y2="22"/></g>
  <text x="190" y="435" font-family="Nunito" font-size="24" font-weight="700" fill="#6B7280">Caiet de programări și</text>
  <text x="190" y="473" font-family="Nunito" font-size="24" font-weight="700" fill="#6B7280">clienți care nu mai vin</text>

  <rect x="630" y="385" width="480" height="120" rx="20" fill="#FFF3EA" stroke="#FFD9BF" stroke-width="2"/>
  <circle cx="685" cy="445" r="24" fill="#FF6B00"/>
  <g transform="translate(673,435)" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,12 9,19 22,3"/></g>
  <text x="730" y="435" font-family="Nunito" font-size="24" font-weight="800" fill="#1A1A1A">Agendă digitală +</text>
  <text x="730" y="473" font-family="Nunito" font-size="24" font-weight="800" fill="#1A1A1A">remindere automate</text>

  <!-- Row 3 -->
  <rect x="90" y="530" width="480" height="120" rx="20" fill="#F3F4F6"/>
  <circle cx="145" cy="590" r="24" fill="#E5E7EB"/>
  <g transform="translate(133,578)" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round"><line x1="2" y1="2" x2="22" y2="22"/><line x1="22" y1="2" x2="2" y2="22"/></g>
  <text x="190" y="580" font-family="Nunito" font-size="24" font-weight="700" fill="#6B7280">Nu știi exact cât ai</text>
  <text x="190" y="618" font-family="Nunito" font-size="24" font-weight="700" fill="#6B7280">încasat luna asta</text>

  <rect x="630" y="530" width="480" height="120" rx="20" fill="#FFF3EA" stroke="#FFD9BF" stroke-width="2"/>
  <circle cx="685" cy="590" r="24" fill="#FF6B00"/>
  <g transform="translate(673,580)" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,12 9,19 22,3"/></g>
  <text x="730" y="580" font-family="Nunito" font-size="24" font-weight="800" fill="#1A1A1A">Rapoarte și statistici</text>
  <text x="730" y="618" font-family="Nunito" font-size="24" font-weight="800" fill="#1A1A1A">reale, la zi</text>

  <!-- AI differentiator -->
  <rect x="90" y="710" width="1020" height="430" rx="28" fill="#1A1A1A"/>
  <text x="135" y="790" font-family="Nunito" font-size="26" font-weight="900" fill="#FF8C42" letter-spacing="2">CE NE FACE DIFERIȚI</text>
  <text x="135" y="855" font-family="Nunito" font-size="40" font-weight="900" fill="#FFFFFF">Asistent AI pentru salonul tău</text>

  <!-- AI item 1 -->
  <circle cx="155" cy="925" r="10" fill="#FF8C42"/>
  <text x="190" y="935" font-family="Nunito" font-size="27" font-weight="700" fill="#FFFFFF">Fișă medicală inteligentă — alergii și note</text>
  <text x="190" y="975" font-family="Nunito" font-size="24" font-weight="600" fill="#9CA3AF">din vizitele anterioare, înainte de fiecare programare</text>

  <!-- AI item 2 -->
  <circle cx="155" cy="1027" r="10" fill="#FF8C42"/>
  <text x="190" y="1037" font-family="Nunito" font-size="27" font-weight="700" fill="#FFFFFF">Răspunsuri AI la recenzii — în câteva secunde</text>

  <!-- AI item 3 -->
  <circle cx="155" cy="1087" r="10" fill="#FF8C42"/>
  <text x="190" y="1097" font-family="Nunito" font-size="27" font-weight="700" fill="#FFFFFF">Alertă clienți inactivi — îi aduci înapoi la timp</text>

  <!-- Footer -->
  <rect x="0" y="1200" width="1200" height="300" fill="url(#orange2)"/>
  <text x="600" y="1300" font-family="Nunito" font-size="44" font-weight="900" fill="#FFFFFF" text-anchor="middle">Nu un calendar online.</text>
  <text x="600" y="1365" font-family="Nunito" font-size="44" font-weight="900" fill="#FFFFFF" text-anchor="middle">Un partener pentru salonul tău.</text>
  <text x="600" y="1440" font-family="Nunito" font-size="30" font-weight="700" fill="#FFFFFF" text-anchor="middle" opacity="0.9">www.calyhub.ro</text>
</svg>
